workflows:
  ios-release:
    name: iOS Release Build

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.xyzfinders.web

    integrations:
      app_store_connect: Codemagic

    scripts:
      - flutter clean
      - flutter pub get
      - cd ios && pod install

      - xcode-project use-profiles

      - flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive