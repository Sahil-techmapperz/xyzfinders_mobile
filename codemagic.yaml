workflows:
  ios-simulator:
    name: iOS Simulator Build
    environment:
      flutter: stable
      xcode: latest

    scripts:
      - flutter clean
      - flutter pub get
      - cd ios && rm -rf Pods Podfile.lock && pod install --repo-update --verbose
      - flutter build ios --simulator --debug

    artifacts:
      - build/ios/iphonesimulator/Runner.app
