name: xyzfinders_mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.4.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  go_router: ^13.0.1
  json_annotation: ^4.8.1
  intl: 0.20.2
  share_plus: ^10.1.2
  reorderable_grid_view: ^2.2.8
  desktop_drop: ^0.4.4
  velocity_x: ^4.3.1
  google_fonts: ^7.0.2
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  carousel_slider: ^5.1.1
  google_maps_flutter: ^2.5.3
  google_sign_in: 6.2.1
  socket_io_client: ^3.1.4
  collection: ^1.19.1
  device_info_plus: ^12.4.0
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.11

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/short_logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/short_logo.png"
  android: true
  ios: true
  fullscreen: true
